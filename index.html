<!DOCTYPE html>
<html>
<head>
    <title>Star Wars Shooter</title>
    <script src="https://unpkg.com/babylonjs@5.0.0/babylon.js"></script>
    <script src="https://unpkg.com/babylonjs-loaders@5.0.0/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; font-size: 16px; text-shadow: 0 0 8px #0f0; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(180, 255, 180, 0.8); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #heat-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 220px; height: 10px; border: 1px solid #0f0; background: rgba(0,0,0,0.5); pointer-events: none; }
        #heat-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #0f0, #ff0, #f00); transition: width 0.05s linear; }
        #overheat-msg { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: #f00; font-family: monospace; font-size: 18px; text-shadow: 0 0 10px #f00; display: none; }
        #lock-hint { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #0f0; font-family: monospace; font-size: 22px; text-shadow: 0 0 10px #0f0; }
        #gameover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); display: none; flex-direction: column; align-items: center; justify-content: center; color: #f00; font-family: monospace; }
        #gameover h1 { font-size: 48px; text-shadow: 0 0 20px #f00; }
        #gameover p { color: #0f0; font-size: 20px; }
        #restart { background: #0f0; color: #000; border: none; padding: 12px 30px; font-family: monospace; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #start-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #0f0; font-family: monospace; opacity: 0.7; text-align: center; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>WAVE: <span id="wave">1</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="heat-container"><div id="heat-bar"></div></div>
    <div id="overheat-msg">OVERHEATED</div>
    <div id="lock-hint">CLICK TO PLAY</div>
    <div id="start-hint">WASD move &bull; SHIFT sprint &bull; SPACE jump &bull; C crouch &bull; RIGHT-CLICK aim &bull; ESC free mouse</div>
    <div id="gameover">
        <h1>GAME OVER</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        scene.clearColor = new BABYLON.Color3(0.01, 0.01, 0.03);
        scene.collisionsEnabled = true;

        // ---------- CAMERA ----------
        const BASE_FOV = 0.8, ADS_FOV = 0.45;
        const BASE_SENS = 1200, ADS_SENS = 2800; // higher = less sensitive
        const STAND_H = 1.7, CROUCH_H = 0.9;
        const camera = new BABYLON.UniversalCamera('camera', new BABYLON.Vector3(0, STAND_H, -8), scene);
        camera.attachControl(canvas, true);
        camera.speed = 0.35;
        camera.minZ = 0.05;
        camera.fov = BASE_FOV;
        camera.inertia = 0.5;
        camera.angularSensibility = BASE_SENS;
        camera.keysUp = [87]; camera.keysDown = [83];
        camera.keysLeft = [65]; camera.keysRight = [68];
        camera.checkCollisions = true;
        camera.ellipsoid = new BABYLON.Vector3(0.45, 0.8, 0.45);

        // ---------- POINTER LOCK ----------
        const lockHint = document.getElementById('lock-hint');
        canvas.addEventListener('click', () => {
            if (!document.pointerLockElement) {
                canvas.requestPointerLock();
            }
        });
        document.addEventListener('pointerlockchange', () => {
            lockHint.style.display = document.pointerLockElement ? 'none' : 'block';
        });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // ---------- LIGHTS ----------
        const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
        hemi.intensity = 0.8;
        const dir = new BABYLON.DirectionalLight('dir', new BABYLON.Vector3(0, -1, 1), scene);
        dir.intensity = 0.4;

        // ---------- GROUND GRID ----------
        const ground = BABYLON.MeshBuilder.CreateGround('ground', { width: 200, height: 200 }, scene);
        const gridTex = new BABYLON.DynamicTexture('gridTex', 512, scene);
        const gctx = gridTex.getContext();
        gctx.fillStyle = '#0a0a12'; gctx.fillRect(0, 0, 512, 512);
        gctx.strokeStyle = '#1a3a5c'; gctx.lineWidth = 2;
        for (let i = 0; i <= 512; i += 64) {
            gctx.beginPath(); gctx.moveTo(i, 0); gctx.lineTo(i, 512); gctx.stroke();
            gctx.beginPath(); gctx.moveTo(0, i); gctx.lineTo(512, i); gctx.stroke();
        }
        gridTex.update();
        const groundMat = new BABYLON.StandardMaterial('gmat', scene);
        groundMat.diffuseTexture = gridTex;
        groundMat.diffuseTexture.uScale = 25;
        groundMat.diffuseTexture.vScale = 25;
        groundMat.specularColor = new BABYLON.Color3(0.12, 0.08, 0.08); // subtle
        groundMat.specularPower = 48;
        ground.material = groundMat;
        ground.isPickable = true;
        ground.checkCollisions = true;

        // ---------- CRATES (obstacles: block movement + shots, small ones jumpable) ----------
        const crateMat = new BABYLON.StandardMaterial('crateMat', scene);
        crateMat.diffuseColor = new BABYLON.Color3(0.25, 0.25, 0.3);
        crateMat.specularColor = new BABYLON.Color3(0.4, 0.3, 0.3);
        crateMat.specularPower = 24;
        const crates = [];
        for (let i = 0; i < 50; i++) {
            // Mix of small jumpable crates (~1m) and big cover (2-3m)
            const size = Math.random() < 0.5 ? 0.9 + Math.random() * 0.3 : 1.8 + Math.random() * 1.2;
            const crate = BABYLON.MeshBuilder.CreateBox('crate' + i, { size }, scene);
            let px, pz;
            do {
                px = (Math.random() - 0.5) * 140;
                pz = (Math.random() - 0.5) * 140;
            } while (Math.hypot(px - 0, pz - (-8)) < 5); // keep spawn area clear
            crate.position = new BABYLON.Vector3(px, size / 2, pz);
            crate.rotation.y = Math.random() * Math.PI;
            crate.material = crateMat;
            crate.isPickable = true;
            crate.checkCollisions = true;
            crate.metadata = { crate: true };
            crates.push(crate);
        }

        // ---------- GUN ----------
        const gun = new BABYLON.TransformNode('gun', scene);
        gun.parent = camera;
        const GUN_HIP = new BABYLON.Vector3(0.35, -0.3, 1.2);
        const GUN_ADS = new BABYLON.Vector3(0, -0.18, 0.9);
        gun.position = GUN_HIP.clone();

        const gunMat = new BABYLON.StandardMaterial('gunMat', scene);
        gunMat.diffuseColor = new BABYLON.Color3(0.15, 0.15, 0.18);
        gunMat.specularColor = new BABYLON.Color3(0.3, 0.3, 0.3);

        const barrel = BABYLON.MeshBuilder.CreateCylinder('barrel', { height: 0.7, diameter: 0.07 }, scene);
        barrel.rotation.x = Math.PI / 2; barrel.position.z = 0.35;
        barrel.material = gunMat; barrel.parent = gun; barrel.isPickable = false;

        const body = BABYLON.MeshBuilder.CreateBox('gunbody', { width: 0.12, height: 0.18, depth: 0.45 }, scene);
        body.material = gunMat; body.parent = gun; body.isPickable = false;

        const grip = BABYLON.MeshBuilder.CreateBox('grip', { width: 0.09, height: 0.25, depth: 0.1 }, scene);
        grip.position.y = -0.18; grip.position.z = -0.12; grip.rotation.x = 0.3;
        grip.material = gunMat; grip.parent = gun; grip.isPickable = false;

        const muzzle = BABYLON.MeshBuilder.CreateSphere('muzzle', { diameter: 0.12 }, scene);
        muzzle.position.z = 0.72; muzzle.parent = gun; muzzle.isPickable = false;
        const muzzleMat = new BABYLON.StandardMaterial('muzzleMat', scene);
        muzzleMat.emissiveColor = new BABYLON.Color3(1, 0.9, 0.4);
        muzzleMat.alpha = 0;
        muzzle.material = muzzleMat;

        const muzzleLight = new BABYLON.PointLight('muzzleLight', BABYLON.Vector3.Zero(), scene);
        muzzleLight.parent = muzzle;
        muzzleLight.diffuse = new BABYLON.Color3(1, 0.8, 0.3);
        muzzleLight.intensity = 0;

        // ---------- BOLTS ----------
        const glow = new BABYLON.GlowLayer('glow', scene);
        glow.intensity = 1.8;

        const boltMat = new BABYLON.StandardMaterial('boltMat', scene);
        boltMat.emissiveColor = new BABYLON.Color3(1, 0.15, 0.1);
        boltMat.disableLighting = true;

        const boltTemplate = BABYLON.MeshBuilder.CreateCylinder('boltTemplate', { height: 1.4, diameter: 0.06 }, scene);
        boltTemplate.rotation.x = Math.PI / 2;
        boltTemplate.bakeCurrentTransformIntoVertices();
        boltTemplate.material = boltMat;
        boltTemplate.isPickable = false;
        boltTemplate.setEnabled(false);
        let bolts = [];
        const BOLT_SPEED = 120;

        // ---------- SOUND ----------
        let audioCtx = null;
        function blasterSound(heatFrac) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth';
            // Pitch climbs as the blaster heats up
            const startF = 900 + heatFrac * 550;
            const endF = 120 + heatFrac * 180;
            o.frequency.setValueAtTime(startF, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(endF, audioCtx.currentTime + 0.18);
            g.gain.setValueAtTime(0.25, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.2);
        }
        function hitSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square';
            o.frequency.setValueAtTime(200, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.25);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.3);
        }
        function overheatSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(400, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        // ---------- STATE ----------
        let score = 0, wave = 1, gameOver = false;

        // Overheat (tighter tuning: ~7 shots to redline, slower recovery)
        let heat = 0;
        const HEAT_PER_SHOT = 14;
        const COOL_RATE = 18;
        const OVERHEAT_COOL_RATE = 12;
        let overheated = false;

        let troopers = [];
        let container = null;
        let hasRunAnim = false;
        const TROOPER_HEIGHT = 1.8;
        let trooperScale = 1;

        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const heatBar = document.getElementById('heat-bar');
        const overheatMsg = document.getElementById('overheat-msg');

        // ---------- LOAD MODEL ----------
        BABYLON.SceneLoader.LoadAssetContainer('./', 'stormtrooper.glb', scene, function(loaded) {
            container = loaded;

            let min = new BABYLON.Vector3(Infinity, Infinity, Infinity);
            let max = new BABYLON.Vector3(-Infinity, -Infinity, -Infinity);
            container.meshes.forEach(m => {
                if (!m.getBoundingInfo) return;
                const b = m.getBoundingInfo().boundingBox;
                min = BABYLON.Vector3.Minimize(min, b.minimumWorld);
                max = BABYLON.Vector3.Maximize(max, b.maximumWorld);
            });
            trooperScale = TROOPER_HEIGHT / (max.y - min.y);

            hasRunAnim = container.animationGroups.length > 0;
            spawnWave();
        });

        function spawnTrooper() {
            const inst = container.instantiateModelsToScene(name => name, false);
            const root = inst.rootNodes[0];
            root.scaling.scaleInPlace(trooperScale);

            const angle = Math.random() * Math.PI * 2;
            const dist = 20 + Math.random() * 15;
            root.position = new BABYLON.Vector3(
                camera.position.x + Math.sin(angle) * dist, 0,
                camera.position.z + Math.cos(angle) * dist
            );

            let anim = null;
            if (inst.animationGroups.length > 0) {
                anim = inst.animationGroups.find(a => /run|walk|move|sprint/i.test(a.name)) || inst.animationGroups[0];
                anim.start(true);
            }

            const childMeshes = root.getChildMeshes();
            childMeshes.forEach(m => { m.isPickable = true; });
            const trooper = { root, meshes: childMeshes, alive: true, anim, bobPhase: Math.random() * Math.PI * 2 };
            childMeshes.forEach(m => m.metadata = { trooper });
            troopers.push(trooper);
        }

        function spawnWave() {
            const count = Math.min(3 + wave - 1, 8);
            for (let i = 0; i < count; i++) spawnTrooper();
        }

        // ---------- INPUT ----------
        let isADS = false;
        let velY = 0, grounded = true, crouching = false;
        let sprinting = false;
        let recoilT = 0;

        canvas.addEventListener('mousedown', e => {
            if (!document.pointerLockElement) return;
            if (e.button === 2) { isADS = true; return; }
            if (e.button !== 0) return;
            if (gameOver || !container) return;
            if (overheated) return;

            const heatFrac = heat / 100;
            heat += HEAT_PER_SHOT;
            if (heat >= 100) {
                heat = 100;
                overheated = true;
                overheatMsg.style.display = 'block';
                overheatSound();
            }

            blasterSound(heatFrac);

            muzzleMat.alpha = 1;
            muzzleLight.intensity = 3;
            recoilT = 1;
            setTimeout(() => { muzzleMat.alpha = 0; muzzleLight.intensity = 0; }, 60);

            // Aim-corrected firing: bolt flies from muzzle to whatever
            // is under the crosshair, so it lands on the dot
            const aimRay = camera.getForwardRay(500);
            const aimHit = scene.pickWithRay(aimRay, m => m.isPickable && m.metadata && (m.metadata.trooper || m.metadata.crate));
            const targetPoint = (aimHit && aimHit.hit)
                ? aimHit.pickedPoint
                : camera.position.add(aimRay.direction.scale(300));

            const bolt = boltTemplate.clone('bolt');
            bolt.setEnabled(true);
            bolt.position = muzzle.getAbsolutePosition().clone();
            const direction = targetPoint.subtract(bolt.position).normalize();
            bolt.lookAt(bolt.position.add(direction));

            const boltLight = new BABYLON.PointLight('boltLight', BABYLON.Vector3.Zero(), scene);
            boltLight.parent = bolt;
            boltLight.diffuse = new BABYLON.Color3(1, 0.25, 0.12);
            boltLight.specular = new BABYLON.Color3(1, 0.3, 0.2);
            boltLight.intensity = 3;
            boltLight.range = 9;

            bolts.push({ mesh: bolt, light: boltLight, direction, distanceLeft: 150 });
        });
        canvas.addEventListener('mouseup', e => {
            if (e.button === 2) isADS = false;
        });

        document.addEventListener('keydown', e => {
            if (e.code === 'ShiftLeft') sprinting = true;
            if (e.code === 'Space' && grounded) {
                velY = 5.5;
                grounded = false;
            }
            if (e.code === 'KeyC') crouching = true;
        });
        document.addEventListener('keyup', e => {
            if (e.code === 'KeyC') crouching = false;
            if (e.code === 'ShiftLeft') sprinting = false;
        });

        // ---------- KILL ----------
        function killTrooper(trooper, hitPoint) {
            trooper.alive = false;
            if (trooper.anim) trooper.anim.stop();
            hitSound();
            screenShake();
            sparkExplosion(hitPoint || trooper.root.position);

            score++;
            scoreEl.textContent = score;
            if (score % 5 === 0) { wave++; waveEl.textContent = wave; }

            const root = trooper.root;
            const tipAnim = new BABYLON.Animation('tip', 'rotation.x', 60,
                BABYLON.Animation.ANIMATIONTYPE_FLOAT, BABYLON.Animation.ANIMATIONLOOPMODE_CONSTANT);
            tipAnim.setKeys([{ frame: 0, value: root.rotation.x }, { frame: 30, value: root.rotation.x + Math.PI / 2 }]);
            root.animations = [tipAnim];
            scene.beginAnimation(root, 0, 30, false);

            setTimeout(() => {
                root.dispose();
                troopers = troopers.filter(t => t !== trooper);
                spawnTrooper();
                if (score % 5 === 0) spawnTrooper();
            }, 1000);
        }

        function impactFlash(position) {
            const flash = new BABYLON.PointLight('flash', position.clone(), scene);
            flash.diffuse = new BABYLON.Color3(1, 0.4, 0.15);
            flash.specular = new BABYLON.Color3(1, 0.5, 0.3);
            flash.intensity = 10;
            flash.range = 12;
            let life = 1;
            const obs = scene.onBeforeRenderObservable.add(() => {
                life -= engine.getDeltaTime() / 150;
                flash.intensity = 10 * Math.max(0, life);
                if (life <= 0) {
                    scene.onBeforeRenderObservable.remove(obs);
                    flash.dispose();
                }
            });
        }

        function sparkExplosion(position) {
            const ps = new BABYLON.ParticleSystem('sparks', 150, scene);
            ps.particleTexture = new BABYLON.Texture('https://assets.babylonjs.com/textures/flare.png', scene);
            ps.emitter = position.clone();
            ps.minEmitBox = new BABYLON.Vector3(-0.2, 0, -0.2);
            ps.maxEmitBox = new BABYLON.Vector3(0.2, 1.5, 0.2);
            ps.color1 = new BABYLON.Color4(1, 0.9, 0.3, 1);
            ps.color2 = new BABYLON.Color4(1, 0.4, 0.1, 1);
            ps.colorDead = new BABYLON.Color4(0.2, 0, 0, 0);
            ps.minSize = 0.08; ps.maxSize = 0.4;
            ps.minLifeTime = 0.2; ps.maxLifeTime = 0.6;
            ps.emitRate = 1200;
            ps.direction1 = new BABYLON.Vector3(-2, 2, -2);
            ps.direction2 = new BABYLON.Vector3(2, 4, 2);
            ps.gravity = new BABYLON.Vector3(0, -9.8, 0);
            ps.start();
            setTimeout(() => { ps.stop(); setTimeout(() => ps.dispose(), 800); }, 200);
        }

        // Small spark when a bolt hits a crate
        function crateImpact(position) {
            impactFlash(position);
            const ps = new BABYLON.ParticleSystem('crateSparks', 40, scene);
            ps.particleTexture = new BABYLON.Texture('https://assets.babylonjs.com/textures/flare.png', scene);
            ps.emitter = position.clone();
            ps.color1 = new BABYLON.Color4(1, 0.8, 0.3, 1);
            ps.color2 = new BABYLON.Color4(1, 0.3, 0.1, 1);
            ps.colorDead = new BABYLON.Color4(0.1, 0, 0, 0);
            ps.minSize = 0.04; ps.maxSize = 0.15;
            ps.minLifeTime = 0.1; ps.maxLifeTime = 0.35;
            ps.emitRate = 600;
            ps.direction1 = new BABYLON.Vector3(-1.5, 1, -1.5);
            ps.direction2 = new BABYLON.Vector3(1.5, 2.5, 1.5);
            ps.gravity = new BABYLON.Vector3(0, -9.8, 0);
            ps.start();
            setTimeout(() => { ps.stop(); setTimeout(() => ps.dispose(), 500); }, 120);
        }

        let shakeT = 0;
        function screenShake() { shakeT = 1; }
        let bobT = 0;
        const lastPos = camera.position.clone();

        // Find the surface height under the player (ground or crate tops)
        function surfaceYUnderPlayer() {
            const ray = new BABYLON.Ray(
                new BABYLON.Vector3(camera.position.x, camera.position.y + 0.1, camera.position.z),
                new BABYLON.Vector3(0, -1, 0), 20
            );
            const hit = scene.pickWithRay(ray, m => m === ground || (m.metadata && m.metadata.crate));
            return (hit && hit.hit) ? hit.pickedPoint.y : 0;
        }

        // ---------- GAME LOOP ----------
        scene.onBeforeRenderObservable.add(() => {
            const dt = engine.getDeltaTime() / 1000;

            // Heat cooldown
            if (heat > 0) {
                heat -= (overheated ? OVERHEAT_COOL_RATE : COOL_RATE) * dt;
                if (heat <= 0) {
                    heat = 0;
                    if (overheated) {
                        overheated = false;
                        overheatMsg.style.display = 'none';
                    }
                }
            }
            heatBar.style.width = heat + '%';

            // Bolts (blocked by troopers AND crates)
            for (let i = bolts.length - 1; i >= 0; i--) {
                const b = bolts[i];
                const step = BOLT_SPEED * dt;
                const ray = new BABYLON.Ray(b.mesh.position, b.direction, step + 0.7);
                const hit = scene.pickWithRay(ray, m => m.isPickable && m.metadata && (m.metadata.trooper || m.metadata.crate));
                if (hit && hit.hit && hit.pickedMesh.metadata) {
                    if (hit.pickedMesh.metadata.trooper) {
                        const trooper = hit.pickedMesh.metadata.trooper;
                        if (trooper.alive) killTrooper(trooper, hit.pickedPoint);
                        impactFlash(b.mesh.position);
                    } else {
                        crateImpact(hit.pickedPoint);
                    }
                    b.light.dispose(); b.mesh.dispose(); bolts.splice(i, 1); continue;
                }
                b.mesh.position.addInPlace(b.direction.scale(step));
                b.distanceLeft -= step;
                if (b.distanceLeft <= 0) { b.light.dispose(); b.mesh.dispose(); bolts.splice(i, 1); }
            }

            // ADS: FOV, gun position, and reduced sensitivity
            const targetFov = isADS ? ADS_FOV : BASE_FOV;
            camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 12);
            camera.angularSensibility = isADS ? ADS_SENS : BASE_SENS;
            const targetGun = isADS ? GUN_ADS : GUN_HIP;
            gun.position = BABYLON.Vector3.Lerp(gun.position, targetGun, Math.min(1, dt * 12));

            // Movement bob
            const horizMoved = Math.hypot(camera.position.x - lastPos.x, camera.position.z - lastPos.z);
            if (horizMoved > 0.001 && grounded) {
                bobT += dt * (sprinting ? 13 : 8);
                gun.position.y += Math.sin(bobT) * (sprinting ? 0.03 : 0.015);
                gun.position.x += Math.cos(bobT * 0.5) * 0.01;
                camera.position.y += Math.sin(bobT) * 0.015;
            }
            lastPos.set(camera.position.x, camera.position.y, camera.position.z);

            // Recoil: backward slide + upward kick of the gun
            if (recoilT > 0) {
                recoilT = Math.max(0, recoilT - dt * 8);
                gun.position.z -= recoilT * 0.15;
                gun.rotation.x = -recoilT * 0.09;
            } else {
                gun.rotation.x = 0;
            }

            // Jump + crouch + standing on crates
            const surfaceY = surfaceYUnderPlayer();
            const targetH = surfaceY + (crouching ? CROUCH_H : STAND_H);

            if (!grounded) {
                velY -= 14 * dt;
                camera.position.y += velY * dt;
                if (velY <= 0 && camera.position.y <= targetH) {
                    camera.position.y = targetH;
                    velY = 0;
                    grounded = true;
                }
            } else {
                // Walked off an edge?
                if (camera.position.y - targetH > 0.1) {
                    grounded = false;
                    velY = 0;
                } else {
                    camera.position.y += (targetH - camera.position.y) * Math.min(1, dt * 10);
                }
            }
            camera.speed = crouching ? 0.15 : (isADS ? 0.18 : (sprinting ? 0.6 : 0.35));

            // Shake
            if (shakeT > 0) {
                shakeT = Math.max(0, shakeT - dt * 5);
                camera.rotation.z = (Math.random() - 0.5) * 0.02 * shakeT;
            } else {
                camera.rotation.z = 0;
            }

            if (gameOver) return;

            // Troopers advance
            const speed = (0.8 + wave * 0.15) * dt;
            troopers.forEach(t => {
                if (!t.alive) return;
                const toPlayer = camera.position.subtract(t.root.position);
                toPlayer.y = 0;
                const distance = toPlayer.length();
                if (distance < 1.5) { endGame(); return; }
                t.root.position.addInPlace(toPlayer.normalize().scale(speed));
                t.root.lookAt(new BABYLON.Vector3(camera.position.x, 0, camera.position.z));
                t.root.rotate(BABYLON.Axis.Y, -Math.PI / 2, BABYLON.Space.LOCAL);

                if (!hasRunAnim) {
                    t.bobPhase += dt * 10;
                    t.root.position.y = Math.abs(Math.sin(t.bobPhase)) * 0.12;
                    t.root.rotation.x = 0.15;
                }
            });
        });

        function endGame() {
            gameOver = true;
            document.exitPointerLock();
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover').style.display = 'flex';
        }

        engine.runRenderLoop(() => scene.render());
        window.addEventListener('resize', () => engine.resize());
    </script>
</body>
</html>
