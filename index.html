<!DOCTYPE html>
<html>
<head>
    <title>Star Wars Shooter — Tatooine</title>
    <script src="https://unpkg.com/babylonjs@5.0.0/babylon.js"></script>
    <script src="https://unpkg.com/babylonjs-loaders@5.0.0/babylonjs.loaders.min.js"></script>
    <style>
        body { margin: 0; background: #000; overflow: hidden; }
        canvas { display: block; width: 100vw; height: 100vh; }
        #ui { position: absolute; top: 20px; left: 20px; color: #ffd9a0; font-family: monospace; font-size: 16px; text-shadow: 0 0 8px rgba(255,150,50,0.6); pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background: rgba(255, 240, 200, 0.85); border-radius: 50%; transform: translate(-50%, -50%); pointer-events: none; }
        #heat-container { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); width: 220px; height: 10px; border: 1px solid #ffd9a0; background: rgba(0,0,0,0.4); pointer-events: none; }
        #heat-bar { height: 100%; width: 0%; background: linear-gradient(90deg, #ffb347, #ff7b00, #f00); transition: width 0.05s linear; }
        #health-container { position: absolute; bottom: 40px; left: 30px; width: 200px; height: 14px; border: 1px solid #ffd9a0; background: rgba(0,0,0,0.4); pointer-events: none; }
        #health-bar { height: 100%; width: 100%; background: linear-gradient(90deg, #d43a2a, #e8842a, #6abf4b); transition: width 0.1s linear; }
        #health-label { position: absolute; bottom: 58px; left: 30px; color: #ffd9a0; font-family: monospace; font-size: 12px; pointer-events: none; }
        #dmg-flash { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(ellipse at center, rgba(255,0,0,0) 55%, rgba(255,0,0,0.45) 100%); opacity: 0; pointer-events: none; transition: opacity 0.08s linear; }
        #overheat-msg { position: absolute; bottom: 60px; left: 50%; transform: translateX(-50%); color: #f00; font-family: monospace; font-size: 18px; text-shadow: 0 0 10px #f00; display: none; }
        #lock-hint { position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); color: #ffd9a0; font-family: monospace; font-size: 22px; text-shadow: 0 0 10px rgba(255,150,50,0.8); }
        #gameover { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(20,8,0,0.88); display: none; flex-direction: column; align-items: center; justify-content: center; color: #f00; font-family: monospace; }
        #gameover h1 { font-size: 48px; text-shadow: 0 0 20px #f00; }
        #gameover p { color: #ffd9a0; font-size: 20px; }
        #restart { background: #ffd9a0; color: #201000; border: none; padding: 12px 30px; font-family: monospace; font-size: 18px; cursor: pointer; margin-top: 20px; }
        #start-hint { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); color: #ffd9a0; font-family: monospace; opacity: 0.7; text-align: center; }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui">
        <div>SCORE: <span id="score">0</span></div>
        <div>WAVE: <span id="wave">1</span></div>
    </div>
    <div id="crosshair"></div>
    <div id="health-label">HEALTH</div>
    <div id="health-container"><div id="health-bar"></div></div>
    <div id="heat-container"><div id="heat-bar"></div></div>
    <div id="dmg-flash"></div>
    <div id="overheat-msg">OVERHEATED</div>
    <div id="lock-hint">CLICK TO PLAY — JUNDLAND WASTES</div>
    <div id="start-hint">WASD move &bull; SHIFT sprint &bull; SPACE jump &bull; C crouch &bull; RIGHT-CLICK aim &bull; ESC free mouse</div>
    <div id="gameover">
        <h1>GAME OVER</h1>
        <p>Score: <span id="final-score">0</span></p>
        <button id="restart" onclick="location.reload()">RESTART</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        scene.collisionsEnabled = true;

        // If a model faces the wrong way, tweak these (radians).
        const ROT_RUN = Math.PI / 2;
const ROT_SHOOT = Math.PI / 2;
const ROT_DEATH = Math.PI / 2;

        // ---------- TATOOINE ATMOSPHERE ----------
        scene.clearColor = new BABYLON.Color3(0.93, 0.72, 0.52);
        scene.fogMode = BABYLON.Scene.FOGMODE_EXP2;
        scene.fogDensity = 0.007;
        scene.fogColor = new BABYLON.Color3(0.93, 0.72, 0.52);

        // ---------- CAMERA ----------
        const BASE_FOV = 0.8, ADS_FOV = 0.45;
        const BASE_SENS = 1200, ADS_SENS = 2800;
        const STAND_H = 1.7, CROUCH_H = 0.9;
        const camera = new BABYLON.UniversalCamera('camera', new BABYLON.Vector3(0, STAND_H, -8), scene);
        camera.attachControl(canvas, true);
        camera.speed = 0.65;
        camera.minZ = 0.05;
        camera.fov = BASE_FOV;
        camera.inertia = 0.5;
        camera.angularSensibility = BASE_SENS;
        camera.keysUp = [87]; camera.keysDown = [83];
        camera.keysLeft = [65]; camera.keysRight = [68];
        camera.checkCollisions = true;
        camera.ellipsoid = new BABYLON.Vector3(0.45, 0.8, 0.45);

        // ---------- POINTER LOCK ----------
        const lockHint = document.getElementById('lock-hint');
        canvas.addEventListener('click', () => {
            if (!document.pointerLockElement) canvas.requestPointerLock();
        });
        document.addEventListener('pointerlockchange', () => {
            lockHint.style.display = document.pointerLockElement ? 'none' : 'block';
        });
        canvas.addEventListener('contextmenu', e => e.preventDefault());

        // ---------- LIGHTS ----------
        const hemi = new BABYLON.HemisphericLight('hemi', new BABYLON.Vector3(0, 1, 0), scene);
        hemi.intensity = 0.75;
        hemi.diffuse = new BABYLON.Color3(1, 0.9, 0.75);
        hemi.groundColor = new BABYLON.Color3(0.5, 0.35, 0.2);
        const sun1Light = new BABYLON.DirectionalLight('sun1', new BABYLON.Vector3(-0.5, -1, 0.6), scene);
        sun1Light.intensity = 0.55;
        sun1Light.diffuse = new BABYLON.Color3(1, 0.85, 0.6);

        // ---------- SAND GROUND ----------
        const ground = BABYLON.MeshBuilder.CreateGround('ground', { width: 300, height: 300 }, scene);
        const sandTex = new BABYLON.DynamicTexture('sandTex', 512, scene);
        const sctx = sandTex.getContext();
        sctx.fillStyle = '#c9a06a';
        sctx.fillRect(0, 0, 512, 512);
        for (let i = 0; i < 9000; i++) {
            const shade = Math.random();
            sctx.fillStyle = shade < 0.5 ? 'rgba(140,100,55,0.25)' : 'rgba(240,210,160,0.2)';
            sctx.fillRect(Math.random() * 512, Math.random() * 512, 1.5, 1.5);
        }
        sctx.strokeStyle = 'rgba(160,115,65,0.18)';
        sctx.lineWidth = 2;
        for (let i = 0; i < 40; i++) {
            sctx.beginPath();
            const y = Math.random() * 512;
            sctx.moveTo(0, y);
            for (let x = 0; x <= 512; x += 32) {
                sctx.lineTo(x, y + Math.sin(x * 0.05 + i) * 6);
            }
            sctx.stroke();
        }
        sandTex.update();
        const groundMat = new BABYLON.StandardMaterial('gmat', scene);
        groundMat.diffuseTexture = sandTex;
        groundMat.diffuseTexture.uScale = 12;
        groundMat.diffuseTexture.vScale = 12;
        groundMat.specularColor = new BABYLON.Color3(0.05, 0.04, 0.03);
        ground.material = groundMat;
        ground.isPickable = true;
        ground.checkCollisions = true;

        // ---------- TWIN SUNS ----------
        const sunMat1 = new BABYLON.StandardMaterial('sunMat1', scene);
        sunMat1.emissiveColor = new BABYLON.Color3(1, 0.85, 0.55);
        sunMat1.disableLighting = true;
        const sun1 = BABYLON.MeshBuilder.CreateSphere('sunA', { diameter: 14 }, scene);
        sun1.position = new BABYLON.Vector3(70, 38, 140);
        sun1.material = sunMat1;
        sun1.isPickable = false;
        sun1.applyFog = false;

        const sunMat2 = new BABYLON.StandardMaterial('sunMat2', scene);
        sunMat2.emissiveColor = new BABYLON.Color3(1, 0.6, 0.35);
        sunMat2.disableLighting = true;
        const sun2 = BABYLON.MeshBuilder.CreateSphere('sunB', { diameter: 9 }, scene);
        sun2.position = new BABYLON.Vector3(92, 30, 135);
        sun2.material = sunMat2;
        sun2.isPickable = false;
        sun2.applyFog = false;

        // ---------- OBSTACLES ----------
        const obstacles = [];
        function registerObstacle(mesh, radius) {
            mesh.checkCollisions = true;
            mesh.isPickable = true;
            if (!mesh.metadata) mesh.metadata = {};
            mesh.metadata.obstacle = true;
            obstacles.push({ x: mesh.position.x, z: mesh.position.z, radius });
        }
        function clearOfSpawn(x, z, r) {
            return Math.hypot(x - 0, z - (-8)) > r + 6;
        }

        const domeMat = new BABYLON.StandardMaterial('domeMat', scene);
        domeMat.diffuseColor = new BABYLON.Color3(0.92, 0.85, 0.72);
        domeMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);

        const rockMat = new BABYLON.StandardMaterial('rockMat', scene);
        rockMat.diffuseColor = new BABYLON.Color3(0.62, 0.47, 0.33);
        rockMat.specularColor = new BABYLON.Color3(0.03, 0.03, 0.03);

        const metalMat = new BABYLON.StandardMaterial('metalMat', scene);
        metalMat.diffuseColor = new BABYLON.Color3(0.55, 0.52, 0.48);
        metalMat.specularColor = new BABYLON.Color3(0.25, 0.25, 0.25);

        const crawlerMat = new BABYLON.StandardMaterial('crawlerMat', scene);
        crawlerMat.diffuseColor = new BABYLON.Color3(0.45, 0.28, 0.15);
        crawlerMat.specularColor = new BABYLON.Color3(0.05, 0.05, 0.05);

        const crateMat = new BABYLON.StandardMaterial('crateMat', scene);
        crateMat.diffuseColor = new BABYLON.Color3(0.4, 0.38, 0.35);
        crateMat.specularColor = new BABYLON.Color3(0.15, 0.15, 0.15);

        const domeSpots = [[14, 6], [19, 12], [10, 14], [-24, 28], [-30, 22]];
        domeSpots.forEach(([x, z], i) => {
            if (!clearOfSpawn(x, z, 4)) return;
            const dome = BABYLON.MeshBuilder.CreateSphere('dome' + i, { diameter: 7, slice: 0.5 }, scene);
            dome.position = new BABYLON.Vector3(x, 0, z);
            dome.material = domeMat;
            registerObstacle(dome, 3.6);
            const entry = BABYLON.MeshBuilder.CreateCylinder('entry' + i, { diameter: 2.2, height: 1.6 }, scene);
            entry.position = new BABYLON.Vector3(x + 3.2, 0.8, z);
            entry.material = domeMat;
            registerObstacle(entry, 1.3);
        });

        const vapSpots = [[-12, 18], [6, 30], [28, -8], [-32, -14], [22, 26], [-8, 42], [38, 14]];
        vapSpots.forEach(([x, z], i) => {
            if (!clearOfSpawn(x, z, 1)) return;
            const pole = BABYLON.MeshBuilder.CreateCylinder('vap' + i, { diameter: 0.5, height: 6.5, tessellation: 8 }, scene);
            pole.position = new BABYLON.Vector3(x, 3.25, z);
            pole.material = metalMat;
            registerObstacle(pole, 0.6);
            for (let ring = 0; ring < 3; ring++) {
                const disc = BABYLON.MeshBuilder.CreateCylinder('vapRing' + i + '_' + ring, { diameter: 1.3 - ring * 0.3, height: 0.18, tessellation: 8 }, scene);
                disc.position = new BABYLON.Vector3(x, 4.4 + ring * 0.8, z);
                disc.material = metalMat;
                disc.isPickable = false;
            }
        });

        for (let i = 0; i < 40; i++) {
            let x, z;
            do {
                x = (Math.random() - 0.5) * 220;
                z = (Math.random() - 0.5) * 220;
            } while (!clearOfSpawn(x, z, 3));
            const big = Math.random() < 0.4;
            const s = big ? 2.5 + Math.random() * 3 : 0.9 + Math.random() * 0.5;
            const rock = BABYLON.MeshBuilder.CreateSphere('rock' + i, { diameter: s, segments: 5 }, scene);
            rock.scaling = new BABYLON.Vector3(1 + Math.random() * 0.6, 0.55 + Math.random() * 0.3, 1 + Math.random() * 0.6);
            rock.position = new BABYLON.Vector3(x, (s * rock.scaling.y) / 2 * 0.8, z);
            rock.rotation.y = Math.random() * Math.PI;
            rock.material = rockMat;
            registerObstacle(rock, (s * Math.max(rock.scaling.x, rock.scaling.z)) / 2 + 0.3);
        }

        const ridgeSpots = [[-90, 0, 30, 14], [90, 20, 26, 12], [0, 95, 40, 16], [-40, -90, 34, 13], [60, -80, 28, 11]];
        ridgeSpots.forEach(([x, z, w, h], i) => {
            const ridge = BABYLON.MeshBuilder.CreateSphere('ridge' + i, { diameter: w, segments: 5 }, scene);
            ridge.scaling = new BABYLON.Vector3(1.6, h / w, 1);
            ridge.position = new BABYLON.Vector3(x, h * 0.32, z);
            ridge.rotation.y = Math.random() * Math.PI;
            ridge.material = rockMat;
            registerObstacle(ridge, w * 0.9);
        });

        const crawler = BABYLON.MeshBuilder.CreateBox('crawler', { width: 26, height: 12, depth: 10 }, scene);
        crawler.position = new BABYLON.Vector3(-58, 6, 72);
        crawler.rotation.y = 0.5;
        crawler.material = crawlerMat;
        registerObstacle(crawler, 16);
        const crawlerTop = BABYLON.MeshBuilder.CreateBox('crawlerTop', { width: 18, height: 4, depth: 8 }, scene);
        crawlerTop.position = new BABYLON.Vector3(-58, 14, 72);
        crawlerTop.rotation.y = 0.5;
        crawlerTop.material = crawlerMat;
        crawlerTop.isPickable = false;

        const crateSpots = [[12, 9], [16, 14], [-26, 25], [4, -4], [-6, 8], [24, 2], [-14, -10], [8, 20]];
        crateSpots.forEach(([x, z], i) => {
            if (!clearOfSpawn(x, z, 1)) return;
            const s = 0.9 + Math.random() * 0.25;
            const crate = BABYLON.MeshBuilder.CreateBox('supply' + i, { size: s }, scene);
            crate.position = new BABYLON.Vector3(x, s / 2, z);
            crate.rotation.y = Math.random() * Math.PI;
            crate.material = crateMat;
            registerObstacle(crate, s * 0.75);
        });

        // ---------- E-11 BLASTER ----------
        const gun = new BABYLON.TransformNode('gun', scene);
        gun.parent = camera;
        const GUN_HIP = new BABYLON.Vector3(0.35, -0.3, 1.2);
        const GUN_ADS = new BABYLON.Vector3(0, -0.18, 0.9);
        gun.position = GUN_HIP.clone();

        const gunMat = new BABYLON.StandardMaterial('gunMat', scene);
        gunMat.diffuseColor = new BABYLON.Color3(0.08, 0.08, 0.09);
        gunMat.specularColor = new BABYLON.Color3(0.35, 0.35, 0.38);
        gunMat.specularPower = 48;

        function gunPart(mesh) {
            mesh.material = gunMat;
            mesh.parent = gun;
            mesh.isPickable = false;
            return mesh;
        }

        gunPart(BABYLON.MeshBuilder.CreateBox('e11body', { width: 0.09, height: 0.15, depth: 0.5 }, scene));
        const e11barrel = gunPart(BABYLON.MeshBuilder.CreateCylinder('e11barrel', { diameter: 0.055, height: 0.6, tessellation: 12 }, scene));
        e11barrel.rotation.x = Math.PI / 2;
        e11barrel.position.z = 0.5;
        const shroud = gunPart(BABYLON.MeshBuilder.CreateCylinder('shroud', { diameter: 0.085, height: 0.3, tessellation: 12 }, scene));
        shroud.rotation.x = Math.PI / 2;
        shroud.position.z = 0.38;
        for (let i = 0; i < 4; i++) {
            const ring = gunPart(BABYLON.MeshBuilder.CreateTorus('ring' + i, { diameter: 0.095, thickness: 0.012, tessellation: 14 }, scene));
            ring.rotation.x = Math.PI / 2;
            ring.position.z = 0.28 + i * 0.075;
        }
        const tip = gunPart(BABYLON.MeshBuilder.CreateCylinder('tip', { diameterTop: 0.075, diameterBottom: 0.05, height: 0.07, tessellation: 12 }, scene));
        tip.rotation.x = Math.PI / 2;
        tip.position.z = 0.82;
        const scopeMain = gunPart(BABYLON.MeshBuilder.CreateCylinder('scope', { diameter: 0.05, height: 0.22, tessellation: 10 }, scene));
        scopeMain.rotation.x = Math.PI / 2;
        scopeMain.position.y = 0.12;
        scopeMain.position.z = 0.05;
        const mount1 = gunPart(BABYLON.MeshBuilder.CreateBox('mount1', { width: 0.03, height: 0.06, depth: 0.03 }, scene));
        mount1.position.y = 0.085; mount1.position.z = -0.02;
        const mount2 = gunPart(BABYLON.MeshBuilder.CreateBox('mount2', { width: 0.03, height: 0.06, depth: 0.03 }, scene));
        mount2.position.y = 0.085; mount2.position.z = 0.12;
        const mag = gunPart(BABYLON.MeshBuilder.CreateBox('mag', { width: 0.05, height: 0.16, depth: 0.08 }, scene));
        mag.position.y = -0.13; mag.position.z = 0.12;
        mag.rotation.x = -0.25;
        const e11grip = gunPart(BABYLON.MeshBuilder.CreateBox('e11grip', { width: 0.045, height: 0.2, depth: 0.09 }, scene));
        e11grip.position.y = -0.15; e11grip.position.z = -0.1;
        e11grip.rotation.x = 0.35;
        const stockBar = gunPart(BABYLON.MeshBuilder.CreateBox('stock', { width: 0.03, height: 0.03, depth: 0.28 }, scene));
        stockBar.position.y = 0.06; stockBar.position.z = -0.3;

        const muzzle = BABYLON.MeshBuilder.CreateSphere('muzzle', { diameter: 0.1 }, scene);
        muzzle.position.z = 0.88;
        muzzle.parent = gun;
        muzzle.isPickable = false;
        const muzzleMat = new BABYLON.StandardMaterial('muzzleMat', scene);
        muzzleMat.emissiveColor = new BABYLON.Color3(1, 0.9, 0.4);
        muzzleMat.alpha = 0;
        muzzle.material = muzzleMat;

        const muzzleLight = new BABYLON.PointLight('muzzleLight', BABYLON.Vector3.Zero(), scene);
        muzzleLight.parent = muzzle;
        muzzleLight.diffuse = new BABYLON.Color3(1, 0.8, 0.3);
        muzzleLight.intensity = 0;

        // ---------- BOLTS ----------
        const glow = new BABYLON.GlowLayer('glow', scene);
        glow.intensity = 1.6;

        const boltMat = new BABYLON.StandardMaterial('boltMat', scene);
        boltMat.emissiveColor = new BABYLON.Color3(1, 0.15, 0.1);
        boltMat.disableLighting = true;

        const boltTemplate = BABYLON.MeshBuilder.CreateCylinder('boltTemplate', { height: 1.4, diameter: 0.06 }, scene);
        boltTemplate.rotation.x = Math.PI / 2;
        boltTemplate.bakeCurrentTransformIntoVertices();
        boltTemplate.material = boltMat;
        boltTemplate.isPickable = false;
        boltTemplate.setEnabled(false);
        let bolts = [];
        let enemyBolts = [];
        const BOLT_SPEED = 120;
        const ENEMY_BOLT_SPEED = 70;

        // ---------- SOUND ----------
        let audioCtx = null;
        function blasterSound(heatFrac) {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth';
            const startF = 900 + heatFrac * 550;
            const endF = 120 + heatFrac * 180;
            o.frequency.setValueAtTime(startF, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(endF, audioCtx.currentTime + 0.18);
            g.gain.setValueAtTime(0.25, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.2);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.2);
        }
        function enemyBlasterSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sawtooth';
            o.frequency.setValueAtTime(650, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(90, audioCtx.currentTime + 0.22);
            g.gain.setValueAtTime(0.12, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.24);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.24);
        }
        function hitSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'square';
            o.frequency.setValueAtTime(200, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(50, audioCtx.currentTime + 0.25);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.3);
        }
        function playerHitSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'sine';
            o.frequency.setValueAtTime(120, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(45, audioCtx.currentTime + 0.2);
            g.gain.setValueAtTime(0.4, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.25);
        }
        function overheatSound() {
            if (!audioCtx) return;
            const o = audioCtx.createOscillator(), g = audioCtx.createGain();
            o.type = 'triangle';
            o.frequency.setValueAtTime(400, audioCtx.currentTime);
            o.frequency.exponentialRampToValueAtTime(80, audioCtx.currentTime + 0.5);
            g.gain.setValueAtTime(0.3, audioCtx.currentTime);
            g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.5);
            o.connect(g); g.connect(audioCtx.destination);
            o.start(); o.stop(audioCtx.currentTime + 0.5);
        }

        // ---------- STATE ----------
        let score = 0, wave = 1, gameOver = false;
        let heat = 0;
        const HEAT_PER_SHOT = 14;
        const COOL_RATE = 36;
        const OVERHEAT_COOL_RATE = 24;
        let overheated = false;

        // Player health
        let health = 100;
        const MAX_HEALTH = 100;
        const REGEN_DELAY = 4;    // seconds after last damage
        const REGEN_RATE = 9;     // hp per second
        let lastDamageTime = -99;
        let elapsed = 0;

        // Enemy accuracy: starts ~8%, +2.5% per wave, caps at 45%
        function enemyAccuracy() {
            return Math.min(0.08 + (wave - 1) * 0.025, 0.45);
        }

        let troopers = [];
        const containers = { run: null, shoot: null, death: null };
        const scales = { run: 1, shoot: 1, death: 1 };
        const TROOPER_HEIGHT = 1.8;

        const scoreEl = document.getElementById('score');
        const waveEl = document.getElementById('wave');
        const heatBar = document.getElementById('heat-bar');
        const healthBar = document.getElementById('health-bar');
        const dmgFlash = document.getElementById('dmg-flash');
        const overheatMsg = document.getElementById('overheat-msg');

        // ---------- LOAD ALL THREE MODELS ----------
        function measureScale(container) {
            let min = new BABYLON.Vector3(Infinity, Infinity, Infinity);
            let max = new BABYLON.Vector3(-Infinity, -Infinity, -Infinity);
            container.meshes.forEach(m => {
                if (!m.getBoundingInfo) return;
                const b = m.getBoundingInfo().boundingBox;
                min = BABYLON.Vector3.Minimize(min, b.minimumWorld);
                max = BABYLON.Vector3.Maximize(max, b.maximumWorld);
            });
            return TROOPER_HEIGHT / (max.y - min.y);
        }

        let loadedCount = 0;
        function onModelLoaded() {
            loadedCount++;
            if (loadedCount === 3) spawnWave();
        }

        BABYLON.SceneLoader.LoadAssetContainer('./', 'stormtrooper.glb', scene, function(c) {
            containers.run = c; scales.run = measureScale(c); onModelLoaded();
        });
        BABYLON.SceneLoader.LoadAssetContainer('./', 'stormtrooper_shooting_1.glb', scene, function(c) {
            containers.shoot = c; scales.shoot = measureScale(c); onModelLoaded();
        });
        BABYLON.SceneLoader.LoadAssetContainer('./', 'stormtrooper_death1.glb', scene, function(c) {
            containers.death = c; scales.death = measureScale(c); onModelLoaded();
        });

        function makeInstance(kind, rotOffset) {
            const inst = containers[kind].instantiateModelsToScene(name => name, false);
            const root = inst.rootNodes[0];
            root.scaling.scaleInPlace(scales[kind]);
            root.rotate(BABYLON.Axis.Y, rotOffset, BABYLON.Space.LOCAL);
            const anim = inst.animationGroups.length > 0 ? inst.animationGroups[0] : null;
            if (anim) anim.stop();
            return { root, anim, meshes: root.getChildMeshes() };
        }

        function spawnTrooper() {
            // Parent node that owns position + facing; model instances hang under it
            const node = new BABYLON.TransformNode('trooperNode', scene);

            let px, pz, tries = 0;
            do {
                const angle = Math.random() * Math.PI * 2;
                const dist = 25 + Math.random() * 15;
                px = camera.position.x + Math.sin(angle) * dist;
                pz = camera.position.z + Math.cos(angle) * dist;
                tries++;
            } while (tries < 20 && obstacles.some(o => Math.hypot(px - o.x, pz - o.z) < o.radius + 1.5));
            node.position = new BABYLON.Vector3(px, 0, pz);

            const run = makeInstance('run', ROT_RUN);
            const shoot = makeInstance('shoot', ROT_SHOOT);
            const death = makeInstance('death', ROT_DEATH);
            [run, shoot, death].forEach(v => { v.root.parent = node; v.root.position = BABYLON.Vector3.Zero(); });

            shoot.root.setEnabled(false);
            death.root.setEnabled(false);

            // Run anim: find run/walk clip if multiple
            if (containers.run.animationGroups.length > 0) {
                // animation group already captured in run.anim (first); start it
            }
            if (run.anim) run.anim.start(true);

            const trooper = {
                node, run, shoot, death,
                state: 'advance',
                alive: true,
                shootRange: 12 + Math.random() * 8,
                fireTimer: 0.6 + Math.random() * 0.8,
                lastContact: -99,
                bobPhase: Math.random() * Math.PI * 2
            };
            // Player bolts can hit the run + shoot bodies
            run.meshes.concat(shoot.meshes).forEach(m => {
                m.isPickable = true;
                m.metadata = { trooper };
            });
            death.meshes.forEach(m => { m.isPickable = false; });

            troopers.push(trooper);
        }

        function spawnWave() {
            const count = Math.min(3 + wave - 1, 8);
            for (let i = 0; i < count; i++) spawnTrooper();
        }

        // ---------- STATE SWAPS ----------
        function setTrooperState(t, state) {
            if (t.state === state) return;
            t.state = state;
            t.run.root.setEnabled(state === 'advance');
            t.shoot.root.setEnabled(state === 'shoot');
            t.death.root.setEnabled(state === 'dead');
            if (t.run.anim) state === 'advance' ? t.run.anim.start(true) : t.run.anim.stop();
            if (t.shoot.anim) state === 'shoot' ? t.shoot.anim.start(true) : t.shoot.anim.stop();
            if (state === 'dead' && t.death.anim) {
                t.death.anim.start(false); // play once
                t.death.anim.onAnimationGroupEndObservable.addOnce(() => {
                    setTimeout(() => t.node.dispose(), 400);
                });
                // Fallback in case the observable never fires
                setTimeout(() => { if (!t.node.isDisposed()) t.node.dispose(); }, 4500);
            }
        }

        // ---------- LINE OF SIGHT ----------
        function hasLineOfSight(t) {
            const from = t.node.position.add(new BABYLON.Vector3(0, 1.5, 0));
            const to = camera.position;
            const dir = to.subtract(from);
            const dist = dir.length();
            const ray = new BABYLON.Ray(from, dir.normalize(), dist);
            const hit = scene.pickWithRay(ray, m => m.metadata && m.metadata.obstacle);
            return !(hit && hit.hit);
        }

        // ---------- ENEMY FIRE ----------
        function enemyFire(t) {
            enemyBlasterSound();
            const from = t.node.position.add(new BABYLON.Vector3(0, 1.4, 0));
            // Accurate shot or a near-miss?
            let aim;
            if (Math.random() < enemyAccuracy()) {
                aim = camera.position.add(new BABYLON.Vector3(
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.3
                ));
            } else {
                // Miss: offset target sideways/up so the bolt whizzes past
                const missMag = 1.5 + Math.random() * 3;
                const side = new BABYLON.Vector3(Math.random() - 0.5, Math.random() * 0.5 - 0.1, Math.random() - 0.5).normalize().scale(missMag);
                aim = camera.position.add(side);
            }
            const direction = aim.subtract(from).normalize();
            const bolt = boltTemplate.clone('ebolt');
            bolt.setEnabled(true);
            bolt.position = from.add(direction.scale(0.6));
            bolt.lookAt(bolt.position.add(direction));
            enemyBolts.push({ mesh: bolt, direction, distanceLeft: 120 });
        }

        function damagePlayer(amount) {
            if (gameOver) return;
            health -= amount;
            lastDamageTime = elapsed;
            playerHitSound();
            screenShake();
            dmgFlash.style.opacity = 1;
            setTimeout(() => { dmgFlash.style.opacity = 0; }, 120);
            if (health <= 0) {
                health = 0;
                endGame();
            }
            healthBar.style.width = (health / MAX_HEALTH * 100) + '%';
        }

        // ---------- INPUT ----------
        let isADS = false;
        let velY = 0, grounded = true, crouching = false;
        let sprinting = false;
        let recoilT = 0;

        canvas.addEventListener('mousedown', e => {
            if (!document.pointerLockElement) return;
            if (e.button === 2) { isADS = true; return; }
            if (e.button !== 0) return;
            if (gameOver || loadedCount < 3) return;
            if (overheated) return;

            const heatFrac = heat / 100;
            heat += HEAT_PER_SHOT;
            if (heat >= 100) {
                heat = 100;
                overheated = true;
                overheatMsg.style.display = 'block';
                overheatSound();
            }

            blasterSound(heatFrac);

            muzzleMat.alpha = 1;
            muzzleLight.intensity = 3;
            recoilT = 1;
            setTimeout(() => { muzzleMat.alpha = 0; muzzleLight.intensity = 0; }, 60);

            const aimRay = camera.getForwardRay(500);
            const aimHit = scene.pickWithRay(aimRay, m => m.isPickable && m.metadata && (m.metadata.trooper || m.metadata.obstacle));
            const targetPoint = (aimHit && aimHit.hit)
                ? aimHit.pickedPoint
                : camera.position.add(aimRay.direction.scale(300));

            const bolt = boltTemplate.clone('bolt');
            bolt.setEnabled(true);
            bolt.position = muzzle.getAbsolutePosition().clone();
            const direction = targetPoint.subtract(bolt.position).normalize();
            bolt.lookAt(bolt.position.add(direction));

            const boltLight = new BABYLON.PointLight('boltLight', BABYLON.Vector3.Zero(), scene);
            boltLight.parent = bolt;
            boltLight.diffuse = new BABYLON.Color3(1, 0.25, 0.12);
            boltLight.specular = new BABYLON.Color3(1, 0.3, 0.2);
            boltLight.intensity = 3;
            boltLight.range = 9;

            bolts.push({ mesh: bolt, light: boltLight, direction, distanceLeft: 150 });
        });
        canvas.addEventListener('mouseup', e => {
            if (e.button === 2) isADS = false;
        });

        document.addEventListener('keydown', e => {
            if (e.code === 'ShiftLeft') sprinting = true;
            if (e.code === 'Space' && grounded) {
                velY = 5.5;
                grounded = false;
            }
            if (e.code === 'KeyC') crouching = true;
        });
        document.addEventListener('keyup', e => {
            if (e.code === 'KeyC') crouching = false;
            if (e.code === 'ShiftLeft') sprinting = false;
        });

        // ---------- KILL ----------
        function killTrooper(trooper, hitPoint) {
            trooper.alive = false;
            hitSound();
            sparkExplosion(hitPoint || trooper.node.position.add(new BABYLON.Vector3(0, 1, 0)));
            setTrooperState(trooper, 'dead');

            score++;
            scoreEl.textContent = score;
            if (score % 5 === 0) { wave++; waveEl.textContent = wave; }

            troopers = troopers.filter(t => t !== trooper);
            setTimeout(() => spawnTrooper(), 800);
            if (score % 5 === 0) setTimeout(() => spawnTrooper(), 1200);
        }

        function impactFlash(position) {
            const flash = new BABYLON.PointLight('flash', position.clone(), scene);
            flash.diffuse = new BABYLON.Color3(1, 0.4, 0.15);
            flash.specular = new BABYLON.Color3(1, 0.5, 0.3);
            flash.intensity = 10;
            flash.range = 12;
            let life = 1;
            const obs = scene.onBeforeRenderObservable.add(() => {
                life -= engine.getDeltaTime() / 150;
                flash.intensity = 10 * Math.max(0, life);
                if (life <= 0) {
                    scene.onBeforeRenderObservable.remove(obs);
                    flash.dispose();
                }
            });
        }

        function sparkExplosion(position) {
            const ps = new BABYLON.ParticleSystem('sparks', 150, scene);
            ps.particleTexture = new BABYLON.Texture('https://assets.babylonjs.com/textures/flare.png', scene);
            ps.emitter = position.clone();
            ps.minEmitBox = new BABYLON.Vector3(-0.2, 0, -0.2);
            ps.maxEmitBox = new BABYLON.Vector3(0.2, 1.5, 0.2);
            ps.color1 = new BABYLON.Color4(1, 0.9, 0.3, 1);
            ps.color2 = new BABYLON.Color4(1, 0.4, 0.1, 1);
            ps.colorDead = new BABYLON.Color4(0.2, 0, 0, 0);
            ps.minSize = 0.08; ps.maxSize = 0.4;
            ps.minLifeTime = 0.2; ps.maxLifeTime = 0.6;
            ps.emitRate = 1200;
            ps.direction1 = new BABYLON.Vector3(-2, 2, -2);
            ps.direction2 = new BABYLON.Vector3(2, 4, 2);
            ps.gravity = new BABYLON.Vector3(0, -9.8, 0);
            ps.start();
            setTimeout(() => { ps.stop(); setTimeout(() => ps.dispose(), 800); }, 200);
        }

        function surfaceImpact(position) {
            impactFlash(position);
            const ps = new BABYLON.ParticleSystem('surfSparks', 40, scene);
            ps.particleTexture = new BABYLON.Texture('https://assets.babylonjs.com/textures/flare.png', scene);
            ps.emitter = position.clone();
            ps.color1 = new BABYLON.Color4(1, 0.8, 0.3, 1);
            ps.color2 = new BABYLON.Color4(1, 0.3, 0.1, 1);
            ps.colorDead = new BABYLON.Color4(0.1, 0, 0, 0);
            ps.minSize = 0.04; ps.maxSize = 0.15;
            ps.minLifeTime = 0.1; ps.maxLifeTime = 0.35;
            ps.emitRate = 600;
            ps.direction1 = new BABYLON.Vector3(-1.5, 1, -1.5);
            ps.direction2 = new BABYLON.Vector3(1.5, 2.5, 1.5);
            ps.gravity = new BABYLON.Vector3(0, -9.8, 0);
            ps.start();
            setTimeout(() => { ps.stop(); setTimeout(() => ps.dispose(), 500); }, 120);
        }

        let shakeT = 0;
        function screenShake() { shakeT = 1; }
        let bobT = 0;
        const lastPos = camera.position.clone();

        function surfaceYUnderPlayer() {
            const ray = new BABYLON.Ray(
                new BABYLON.Vector3(camera.position.x, camera.position.y + 0.1, camera.position.z),
                new BABYLON.Vector3(0, -1, 0), 25
            );
            const hit = scene.pickWithRay(ray, m => m === ground || (m.metadata && m.metadata.obstacle));
            return (hit && hit.hit) ? hit.pickedPoint.y : 0;
        }

        // ---------- GAME LOOP ----------
        scene.onBeforeRenderObservable.add(() => {
            const dt = engine.getDeltaTime() / 1000;
            elapsed += dt;

            // Heat cooldown
            if (heat > 0) {
                heat -= (overheated ? OVERHEAT_COOL_RATE : COOL_RATE) * dt;
                if (heat <= 0) {
                    heat = 0;
                    if (overheated) {
                        overheated = false;
                        overheatMsg.style.display = 'none';
                    }
                }
            }
            heatBar.style.width = heat + '%';

            // Health regen
            if (!gameOver && health < MAX_HEALTH && elapsed - lastDamageTime > REGEN_DELAY) {
                health = Math.min(MAX_HEALTH, health + REGEN_RATE * dt);
                healthBar.style.width = (health / MAX_HEALTH * 100) + '%';
            }

            // Player bolts
            for (let i = bolts.length - 1; i >= 0; i--) {
                const b = bolts[i];
                const step = BOLT_SPEED * dt;
                const ray = new BABYLON.Ray(b.mesh.position, b.direction, step + 0.7);
                const hit = scene.pickWithRay(ray, m => m.isPickable && m.metadata && (m.metadata.trooper || m.metadata.obstacle));
                if (hit && hit.hit && hit.pickedMesh.metadata) {
                    if (hit.pickedMesh.metadata.trooper) {
                        const trooper = hit.pickedMesh.metadata.trooper;
                        if (trooper.alive) killTrooper(trooper, hit.pickedPoint);
                        impactFlash(b.mesh.position);
                    } else {
                        surfaceImpact(hit.pickedPoint);
                    }
                    b.light.dispose(); b.mesh.dispose(); bolts.splice(i, 1); continue;
                }
                b.mesh.position.addInPlace(b.direction.scale(step));
                b.distanceLeft -= step;
                if (b.distanceLeft <= 0) { b.light.dispose(); b.mesh.dispose(); bolts.splice(i, 1); }
            }

            // Enemy bolts
            for (let i = enemyBolts.length - 1; i >= 0; i--) {
                const b = enemyBolts[i];
                const step = ENEMY_BOLT_SPEED * dt;

                // Hit an obstacle?
                const ray = new BABYLON.Ray(b.mesh.position, b.direction, step + 0.5);
                const hit = scene.pickWithRay(ray, m => m.metadata && m.metadata.obstacle);
                if (hit && hit.hit) {
                    surfaceImpact(hit.pickedPoint);
                    b.mesh.dispose(); enemyBolts.splice(i, 1); continue;
                }

                // Hit the player? (vertical capsule around the camera)
                const dx = b.mesh.position.x - camera.position.x;
                const dz = b.mesh.position.z - camera.position.z;
                const horizDist = Math.hypot(dx, dz);
                const bodyCenterY = camera.position.y - 0.5;
                if (horizDist < 0.55 && Math.abs(b.mesh.position.y - bodyCenterY) < 1.2) {
                    damagePlayer(12);
                    b.mesh.dispose(); enemyBolts.splice(i, 1); continue;
                }

                b.mesh.position.addInPlace(b.direction.scale(step));
                b.distanceLeft -= step;
                if (b.distanceLeft <= 0) { b.mesh.dispose(); enemyBolts.splice(i, 1); }
            }

            // ADS
            const targetFov = isADS ? ADS_FOV : BASE_FOV;
            camera.fov += (targetFov - camera.fov) * Math.min(1, dt * 12);
            camera.angularSensibility = isADS ? ADS_SENS : BASE_SENS;
            const targetGun = isADS ? GUN_ADS : GUN_HIP;
            gun.position = BABYLON.Vector3.Lerp(gun.position, targetGun, Math.min(1, dt * 12));

            // Movement bob
            const horizMoved = Math.hypot(camera.position.x - lastPos.x, camera.position.z - lastPos.z);
            if (horizMoved > 0.001 && grounded) {
                bobT += dt * (sprinting ? 14 : 9);
                gun.position.y += Math.sin(bobT) * (sprinting ? 0.035 : 0.015);
                gun.position.x += Math.cos(bobT * 0.5) * 0.01;
                camera.position.y += Math.sin(bobT) * 0.015;
            }
            lastPos.set(camera.position.x, camera.position.y, camera.position.z);

            // Recoil
            if (recoilT > 0) {
                recoilT = Math.max(0, recoilT - dt * 8);
                gun.position.z -= recoilT * 0.15;
                gun.rotation.x = -recoilT * 0.09;
            } else {
                gun.rotation.x = 0;
            }

            // Jump + crouch + surfaces
            const surfaceY = surfaceYUnderPlayer();
            const targetH = surfaceY + (crouching ? CROUCH_H : STAND_H);
            if (!grounded) {
                velY -= 14 * dt;
                camera.position.y += velY * dt;
                if (velY <= 0 && camera.position.y <= targetH) {
                    camera.position.y = targetH;
                    velY = 0;
                    grounded = true;
                }
            } else {
                if (camera.position.y - targetH > 0.1) {
                    grounded = false;
                    velY = 0;
                } else {
                    camera.position.y += (targetH - camera.position.y) * Math.min(1, dt * 10);
                }
            }
            camera.speed = crouching ? 0.25 : (isADS ? 0.3 : (sprinting ? 1.15 : 0.65));

            // Shake
            if (shakeT > 0) {
                shakeT = Math.max(0, shakeT - dt * 5);
                camera.rotation.z = (Math.random() - 0.5) * 0.02 * shakeT;
            } else {
                camera.rotation.z = 0;
            }

            if (gameOver) return;

            // ---------- TROOPER AI ----------
            const moveSpeed = (1.0 + wave * 0.18) * dt;
            troopers.forEach(t => {
                if (!t.alive) return;
                const toPlayer = camera.position.subtract(t.node.position);
                toPlayer.y = 0;
                const distance = toPlayer.length();

                // Contact damage (they got to you)
                if (distance < 1.7 && elapsed - t.lastContact > 1.0) {
                    t.lastContact = elapsed;
                    damagePlayer(20);
                }

                if (t.state === 'advance') {
                    // Close enough + can see you → stop and shoot
                    if (distance < t.shootRange && hasLineOfSight(t)) {
                        setTrooperState(t, 'shoot');
                        t.fireTimer = 0.5 + Math.random() * 0.7;
                        return;
                    }

                    const moveDir = toPlayer.normalize();
                    obstacles.forEach(o => {
                        const dx = t.node.position.x - o.x;
                        const dz = t.node.position.z - o.z;
                        const d = Math.hypot(dx, dz);
                        const avoidR = o.radius + 1.4;
                        if (d < avoidR && d > 0.01) {
                            const push = (avoidR - d) / avoidR;
                            moveDir.x += (dx / d) * push * 2.4;
                            moveDir.z += (dz / d) * push * 2.4;
                        }
                    });
                    moveDir.y = 0;
                    moveDir.normalize();

                    t.node.position.addInPlace(moveDir.scale(moveSpeed));
                    const facePoint = t.node.position.add(moveDir);
                    t.node.lookAt(new BABYLON.Vector3(facePoint.x, 0, facePoint.z));
                } else if (t.state === 'shoot') {
                    // Keep facing the player
                    t.node.lookAt(new BABYLON.Vector3(camera.position.x, 0, camera.position.z));

                    // Player broke range or line of sight → chase again
                    if (distance > t.shootRange + 6 || !hasLineOfSight(t)) {
                        setTrooperState(t, 'advance');
                        return;
                    }

                    t.fireTimer -= dt;
                    if (t.fireTimer <= 0) {
                        enemyFire(t);
                        t.fireTimer = 1.6 + Math.random() * 1.2;
                    }
                }
            });
        });

        function endGame() {
            gameOver = true;
            document.exitPointerLock();
            document.getElementById('final-score').textContent = score;
            document.getElementById('gameover').style.display = 'flex';
        }

        engine.runRenderLoop(() => scene.render());
        window.addEventListener('resize', () => engine.resize());
    </script>
</body>
</html>
