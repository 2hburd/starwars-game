<!DOCTYPE html>
<html>
<head>
    <title>Star Wars Shooter</title>
    <script src="https://unpkg.com/babylonjs@5.0.0/babylon.js"></script>
    <style>
        body { margin: 0; background: #000; }
        canvas { display: block; }
        #ui { position: absolute; top: 20px; left: 20px; color: #0f0; font-family: monospace; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 20px; height: 20px; border: 2px solid #0f0; transform: translate(-50%, -50%); }
    </style>
</head>
<body>
    <canvas id="canvas"></canvas>
    <div id="ui"><div>HITS: <span id="hits">0</span></div></div>
    <div id="crosshair"></div>

    <script>
        const canvas = document.getElementById('canvas');
        const engine = new BABYLON.Engine(canvas, true);
        const scene = new BABYLON.Scene(engine);
        
        const camera = new BABYLON.UniversalCamera('camera', new BABYLON.Vector3(0, 0, -10));
        camera.attachControl(canvas, true);
        camera.speed = 0.1;
        
        const light = new BABYLON.HemisphericLight('light', new BABYLON.Vector3(0, 1, 0), scene);
        light.intensity = 0.8;
        
        const sphere = BABYLON.MeshBuilder.CreateSphere('sphere', {diameter: 2}, scene);
        sphere.material = new BABYLON.StandardMaterial('mat', scene);
        sphere.material.diffuse = new BABYLON.Color3(1, 1, 1);
        
        scene.clearColor = new BABYLON.Color3(0, 0, 0);
        
        let hits = 0;
        canvas.addEventListener('click', () => {
            const origin = camera.position;
            const direction = BABYLON.Vector3.Normalize(camera.getTarget().subtract(origin));
            const ray = new BABYLON.Ray(origin, direction, 100);
            const hit = scene.pickWithRay(ray);
            if (hit && hit.hit) {
                hits++;
                document.getElementById('hits').textContent = hits;
                sphere.material.emissiveColor = new BABYLON.Color3(1, 0, 0);
                setTimeout(() => sphere.material.emissiveColor = new BABYLON.Color3(0, 0, 0), 100);
            }
        });
        
        engine.runRenderLoop(() => scene.render());
        window.addEventListener('resize', () => engine.resize());
    </script>
</body>
</html>
